    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Three.js for 3D effects -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" defer></script>
    
    <style>
        /* CSS Variables - 8px Grid System */
        :root {
            /* Colors - Neutral Professional Palette */
            --color-bg: #fafaf9;
            --color-surface: #ffffff;
            --color-text: #1c1917;
            --color-text-muted: #78716c;
            --color-accent: #0d9488;
            --color-accent-dark: #0f766e;
            --color-border: #e7e5e4;
            --color-success: #10b981;
            
            /* Typography */
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
            
            /* Spacing - 8px Grid */
            --space-1: 0.5rem;   /* 8px */
            --space-2: 1rem;     /* 16px */
            --space-3: 1.5rem;   /* 24px */
            --space-4: 2rem;     /* 32px */
            --space-5: 2.5rem;   /* 40px */
            --space-6: 3rem;     /* 48px */
            --space-8: 4rem;     /* 64px */
            --space-10: 5rem;    /* 80px */
            --space-12: 6rem;    /* 96px */
            
            /* Layout */
            --max-width: 1280px;
            --container-padding: var(--space-4);
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 300ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 500ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Reset & Base */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            font-size: 16px;
        }

        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        /* Reduced Motion Support */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }

        /* Scroll Progress Bar */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--color-accent), #14b8a6);
            z-index: 10000;
            transition: width 0.1s linear;
        }

        /* Skip Link for Accessibility */
        .skip-link {
            position: absolute;
            top: -100%;
            left: var(--space-4);
            background: var(--color-accent);
            color: white;
            padding: var(--space-2) var(--space-4);
            border-radius: 0 0 8px 8px;
            text-decoration: none;
            font-weight: 600;
            z-index: 10001;
            transition: top var(--transition-base);
        }
        .skip-link:focus {
            top: 0;
        }

        /* Navigation */
        .site-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(250, 250, 249, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--color-border);
            transform: translateY(-100%);
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideDown {
            to { transform: translateY(0); }
        }

        .nav-container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: var(--space-3) var(--container-padding);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .site-logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
            text-decoration: none;
            letter-spacing: -0.02em;
        }
        .site-logo__accent {
            color: var(--color-accent);
        }

        .site-nav__list {
            display: flex;
            gap: var(--space-6);
            list-style: none;
        }

        .site-nav__link {
            color: var(--color-text);
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            position: relative;
            padding-bottom: var(--space-1);
            transition: color var(--transition-fast);
        }
        .site-nav__link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-accent);
            transition: width var(--transition-base);
        }
        .site-nav__link:hover {
            color: var(--color-accent);
        }
        .site-nav__link:hover::after {
            width: 100%;
        }

        .nav-cta {
            padding: var(--space-2) var(--space-4);
            background: var(--color-accent);
            color: white;
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all var(--transition-base);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.25);
        }
        .nav-cta:hover {
            background: var(--color-accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.35);
        }

        /* Hero Section with 3D Canvas */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: calc(var(--space-12) + 80px) var(--container-padding) var(--space-12);
            position: relative;
            overflow: hidden;
        }

        #hero-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6;
        }

        .hero__container {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-10);
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero__content {
            opacity: 0;
            transform: translateY(40px);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero__badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-1) var(--space-3);
            background: rgba(13, 148, 136, 0.1);
            border: 1px solid rgba(13, 148, 136, 0.2);
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--color-accent);
            margin-bottom: var(--space-4);
        }
        .hero__badge-dot {
            width: 8px;
            height: 8px;
            background: var(--color-accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .hero__title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: var(--space-4);
            color: var(--color-text);
            letter-spacing: -0.02em;
        }
        .hero__title-accent {
            color: var(--color-accent);
            position: relative;
        }
        .hero__title-accent::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 100%;
            height: 8px;
            background: rgba(13, 148, 136, 0.2);
            z-index: -1;
        }

        .hero__description {
            font-size: 1.125rem;
            color: var(--color-text-muted);
            max-width: 480px;
            margin-bottom: var(--space-6);
            line-height: 1.7;
        }

        .hero__actions {
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-6);
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all var(--transition-base);
            cursor: pointer;
            border: none;
        }
        .btn--primary {
            background: var(--color-accent);
            color: white;
            box-shadow: 0 4px 14px rgba(13, 148, 136, 0.3);
        }
        .btn--primary:hover {
            background: var(--color-accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
        }
        .btn--secondary {
            background: transparent;
            color: var(--color-text);
            border: 2px solid var(--color-border);
        }
        .btn--secondary:hover {
            border-color: var(--color-accent);
            color: var(--color-accent);
        }

        /* Hero Visual */
        .hero__visual {
            opacity: 0;
            transform: translateX(60px);
            animation: slideInRight 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .browser-mockup {
            background: var(--color-surface);
            border-radius: 16px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.1), 0 10px 30px rgba(13, 148, 136, 0.08);
            overflow: hidden;
            border: 1px solid var(--color-border);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .browser-mockup__header {
            padding: var(--space-3) var(--space-4);
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        .browser-mockup__dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            transition: transform var(--transition-fast);
        }
        .browser-mockup__dot:hover { transform: scale(1.2); }
        .browser-mockup__dot--red { background: #ef4444; }
        .browser-mockup__dot--yellow { background: #f59e0b; }
        .browser-mockup__dot--green { background: #10b981; }

        .browser-mockup__content {
            padding: var(--space-8);
            text-align: center;
        }
        .browser-mockup__logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: var(--space-3);
        }
        .browser-mockup__headline {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: var(--space-2);
        }
        .browser-mockup__subtext {
            color: var(--color-text-muted);
            margin-bottom: var(--space-4);
        }
        .browser-mockup__button {
            display: inline-block;
            padding: var(--space-2) var(--space-4);
            background: var(--color-accent);
            color: white;
            border-radius: 6px;
            font-weight: 600;
        }

        /* Stats Section */
        .stats {
            padding: var(--space-10) var(--container-padding);
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
        }
        .stats__container {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-6);
            text-align: center;
        }
        .stat__item {
            opacity: 0;
            transform: translateY(30px);
            transition: all var(--transition-slow);
        }
        .stat__item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .stat__number {
            font-family: var(--font-display);
            font-size: 2.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-accent), #14b8a6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-2);
        }
        .stat__label {
            font-size: 0.9375rem;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        /* Services Section */
        .services {
            padding: var(--space-12) var(--container-padding);
            background: var(--color-bg);
        }
        .section__header {
            max-width: 640px;
            margin: 0 auto var(--space-10);
            text-align: center;
        }
        .section__label {
            font-size: 0.875rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: var(--space-3);
        }
        .section__title {
            font-family: var(--font-display);
            font-size: clamp(1.875rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: var(--space-3);
            color: var(--color-text);
        }
        .section__description {
            color: var(--color-text-muted);
            font-size: 1.125rem;
            line-height: 1.7;
        }

        .services__grid {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-6);
        }
        .service__card {
            background: var(--color-surface);
            padding: var(--space-6);
            border-radius: 16px;
            border: 1px solid var(--color-border);
            transition: all var(--transition-base);
            opacity: 0;
            transform: translateY(40px);
        }
        .service__card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .service__card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            border-color: var(--color-accent);
        }
        .service__icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(13, 148, 136, 0.1), rgba(20, 184, 166, 0.1));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: var(--space-4);
            transition: all var(--transition-base);
        }
        .service__card:hover .service__icon {
            background: linear-gradient(135deg, var(--color-accent), #14b8a6);
            transform: scale(1.1) rotate(5deg);
        }
        .service__title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: var(--space-2);
        }
        .service__description {
            color: var(--color-text-muted);
            font-size: 0.9375rem;
            line-height: 1.7;
        }

        /* Process Section */
        .process {
            padding: var(--space-12) var(--container-padding);
            background: var(--color-surface);
        }
        .process__grid {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--space-6);
            position: relative;
        }
        .process__grid::before {
            content: '';
            position: absolute;
            top: 32px;
            left: 12.5%;
            right: 12.5%;
            height: 2px;
            background: linear-gradient(90deg, var(--color-accent), #14b8a6);
            opacity: 0.2;
        }
        .process__step {
            text-align: center;
            position: relative;
            opacity: 0;
            transform: scale(0.8);
            transition: all var(--transition-slow);
        }
        .process__step.visible {
            opacity: 1;
            transform: scale(1);
        }
        .process__number {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--color-accent), #14b8a6);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 auto var(--space-4);
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.3);
            transition: transform var(--transition-base);
        }
        .process__step:hover .process__number {
            transform: scale(1.1);
        }
        .process__title {
            font-family: var(--font-display);
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: var(--space-2);
        }
        .process__description {
            color: var(--color-text-muted);
            font-size: 0.9375rem;
        }

        /* Portfolio Section */
        .portfolio {
            padding: var(--space-12) var(--container-padding);
            background: var(--color-bg);
        }
        .portfolio__grid {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--space-6);
        }
        .portfolio__item {
            background: var(--color-surface);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--color-border);
            transition: all var(--transition-base);
            opacity: 0;
            transform: translateY(40px);
        }
        .portfolio__item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .portfolio__item:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.1);
        }
        .portfolio__image {
            height: 280px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
            transition: transform var(--transition-slow);
        }
        .portfolio__item:hover .portfolio__image {
            transform: scale(1.05);
        }
        .portfolio__content {
            padding: var(--space-5);
        }
        .portfolio__tag {
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: var(--space-2);
        }
        .portfolio__title {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* Pricing Section */
        .pricing {
            padding: var(--space-12) var(--container-padding);
            background: var(--color-surface);
        }
        .pricing__grid {
            max-width: var(--max-width);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-6);
            align-items: start;
        }
        .pricing__card {
            background: var(--color-bg);
            padding: var(--space-6);
            border-radius: 16px;
            border: 2px solid var(--color-border);
            text-align: center;
            transition: all var(--transition-base);
            opacity: 0;
            transform: translateY(40px);
            position: relative;
        }
        .pricing__card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .pricing__card--featured {
            border-color: var(--color-accent);
            background: linear-gradient(135deg, var(--color-surface), #f0fdfa);
            transform: scale(1.05);
            box-shadow: 0 20px 60px rgba(13, 148, 136, 0.12);
        }
        .pricing__card--featured::before {
            content: 'Most Popular';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--color-accent), #14b8a6);
            color: white;
            padding: var(--space-1) var(--space-4);
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .pricing__card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }
        .pricing__card--featured:hover {
            transform: scale(1.05) translateY(-8px);
        }
        .pricing__name {
            font-family: var(--font-display);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: var(--space-2);
        }
        .pricing__description {
            color: var(--color-text-muted);
            font-size: 0.9375rem;
            margin-bottom: var(--space-4);
        }
        .pricing__price {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--color-text), #44403c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-1);
        }
        .pricing__period {
            font-size: 1rem;
            font-weight: 500;
            color: var(--color-text-muted);
            -webkit-text-fill-color: var(--color-text-muted);
        }
        .pricing__features {
            list-style: none;
            margin: var(--space-6) 0;
            text-align: left;
        }
        .pricing__feature {
            padding: var(--space-2) 0;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.9375rem;
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        .pricing__feature::before {
            content: '✓';
            color: var(--color-accent);
            font-weight: 700;
            font-size: 1.125rem;
        }

        /* CTA Section */
        .cta {
            padding: var(--space-12) var(--container-padding);
            background: linear-gradient(135deg, var(--color-text), #292524);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .cta::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.1) 0%, transparent 50%);
            animation: rotate 30s linear infinite;
        }
        @keyframes rotate {
            to { transform: rotate(360deg); }
        }
        .cta__container {
            max-width: 640px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        .cta__title {
            font-family: var(--font-display);
            font-size: clamp(1.875rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: var(--space-4);
        }
        .cta__description {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.125rem;
            margin-bottom: var(--space-6);
        }
        .btn--large {
            padding: var(--space-4) var(--space-8);
            font-size: 1.125rem;
        }

        /* Footer */
        .site-footer {
            padding: var(--space-8) var(--container-padding);
            background: var(--color-text);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
        }
        .site-footer__logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: var(--space-3);
        }
        .site-footer__logo-accent {
            color: var(--color-accent);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .hero__container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .hero__description {
                margin-left: auto;
                margin-right: auto;
            }
            .hero__actions {
                justify-content: center;
            }
            .hero__visual {
                order: -1;
                max-width: 500px;
                margin: 0 auto;
            }
            .services__grid,
            .pricing__grid {
                grid-template-columns: 1fr;
            }
            .process__grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .process__grid::before {
                display: none;
            }
            .portfolio__grid {
                grid-template-columns: 1fr;
            }
            .stats__container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .site-nav__list {
                display: none;
            }
            .process__grid {
                grid-template-columns: 1fr;
            }
            .stats__container {
                grid-template-columns: 1fr;
            }
            .pricing__card--featured {
                transform: none;
            }
            .pricing__card--featured:hover {
                transform: translateY(-8px);
            }
        }
    </style>
