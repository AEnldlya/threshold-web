<!DOCTYPE html>
<html>
<head>
    <title>Website Sales Logo</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        svg {
            width: 300px;
            height: 300px;
            margin-bottom: 20px;
        }
        h1 {
            color: #0066cc;
            margin: 0;
        }
        p {
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Website Sales App Logo</h1>
    
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="300" height="300">
        <!-- Background -->
        <rect width="200" height="200" fill="#0066cc" rx="40"/>
        
        <!-- Website/Globe Icon -->
        <circle cx="100" cy="100" r="50" fill="none" stroke="white" stroke-width="3"/>
        
        <!-- Horizontal line through globe -->
        <line x1="50" y1="100" x2="150" y2="100" stroke="white" stroke-width="2"/>
        
        <!-- Vertical line through globe -->
        <line x1="100" y1="50" x2="100" y2="150" stroke="white" stroke-width="2"/>
        
        <!-- Two curved arcs for globe effect -->
        <path d="M 70 70 A 30 30 0 0 1 130 70" fill="none" stroke="white" stroke-width="2"/>
        <path d="M 70 130 A 30 30 0 0 0 130 130" fill="none" stroke="white" stroke-width="2"/>
        
        <!-- Upward arrow for sales growth -->
        <polygon points="130,140 130,90 120,105 110,95 140,70 170,95 160,105 160,140" fill="white"/>
        
        <!-- Text below (optional) -->
        <text x="100" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">WEBSITE SALES</text>
    </svg>
    
    <p>Blue background with white globe + growth arrow</p>
    <p>Professional, clean, represents websites & sales</p>
</div>
</body>
</html>
