<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Webcraft | Professional Website Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #fafafa;
            --color-surface: #ffffff;
            --color-text: #0f172a;
            --color-text-muted: #64748b;
            --color-accent: #3b82f6;
            --color-accent-dark: #1d4ed8;
            --color-border: #e2e8f0;
            --font-display: 'Plus Jakarta Sans', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* Scroll Progress Bar */
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--color-accent), #8b5cf6);
            z-index: 10000;
            transition: width 0.1s linear;
        }

        /* Navigation with blur and slide */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 1.25rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
            transform: translateY(-100%);
            animation: slideDown 0.8s var(--ease-out-expo) forwards;
        }

        @keyframes slideDown {
            to { transform: translateY(0); }
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--color-text);
            letter-spacing: -0.02em;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.3s forwards;
        }
        .logo span { color: var(--color-accent); }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
        }
        .nav-links li {
            opacity: 0;
            transform: translateY(-10px);
            animation: fadeInDown 0.5s ease-out forwards;
        }
        .nav-links li:nth-child(1) { animation-delay: 0.4s; }
        .nav-links li:nth-child(2) { animation-delay: 0.5s; }
        .nav-links li:nth-child(3) { animation-delay: 0.6s; }
        .nav-links li:nth-child(4) { animation-delay: 0.7s; }

        @keyframes fadeInDown {
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        .nav-links a {
            color: var(--color-text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            position: relative;
            padding-bottom: 0.25rem;
            transition: var(--transition-smooth);
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--color-accent);
            transition: width 0.3s var(--ease-out-expo);
        }
        .nav-links a:hover { color: var(--color-accent); }
        .nav-links a:hover::after { width: 100%; }

        .nav-cta {
            padding: 0.75rem 1.5rem;
            background: var(--color-accent);
            color: white;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 8px;
            transition: var(--transition-smooth);
            opacity: 0;
            transform: scale(0.9);
            animation: scaleIn 0.5s ease-out 0.8s forwards;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25);
        }
        .nav-cta:hover {
            background: var(--color-accent-dark);
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
        }

        @keyframes scaleIn {
            to { 
                opacity: 1; 
                transform: scale(1);
            }
        }

        /* Hero with staggered animations */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 8rem 5% 5rem;
            position: relative;
            overflow: hidden;
        }

        /* Animated gradient background */
        .hero::before {
            content: '';
            position: absolute;
            top: -50%; right: -20%;
            width: 80%; height: 120%;
            background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 40%);
            animation: gradientShift 15s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-5%, 5%) rotate(5deg); }
        }

        .hero-container {
            max-width: 1300px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5rem;
            align-items: center;
            width: 100%;
        }

        /* Staggered text reveal */
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-accent);
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s var(--ease-out-expo) 0.2s forwards;
        }

        .hero-badge::before {
            content: '';
            width: 8px; height: 8px;
            background: var(--color-accent);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes slideUpFade {
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(2.8rem, 5vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: var(--color-text);
            letter-spacing: -0.03em;
        }

        .hero-title .line {
            display: block;
            overflow: hidden;
        }

        .hero-title .line span {
            display: block;
            transform: translateY(100%);
            opacity: 0;
            animation: revealUp 0.8s var(--ease-out-expo) forwards;
        }

        .hero-title .line:nth-child(1) span { animation-delay: 0.3s; }
        .hero-title .line:nth-child(2) span { animation-delay: 0.45s; }
        .hero-title .line:nth-child(3) span { animation-delay: 0.6s; }

        @keyframes revealUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .hero-title em {
            font-style: normal;
            color: var(--color-accent);
            position: relative;
        }
        .hero-title em::after {
            content: '';
            position: absolute;
            bottom: 5px; left: 0;
            width: 100%; height: 8px;
            background: rgba(59, 130, 246, 0.2);
            z-index: -1;
            transform: scaleX(0);
            transform-origin: left;
            animation: underlineGrow 0.6s var(--ease-out-expo) 1s forwards;
        }

        @keyframes underlineGrow {
            to { transform: scaleX(1); }
        }

        .hero-description {
            font-size: 1.15rem;
            color: var(--color-text-muted);
            max-width: 500px;
            margin-bottom: 2.5rem;
            line-height: 1.7;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s var(--ease-out-expo) 0.7s forwards;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeIn 0.6s ease-out 0.9s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .btn-primary {
            padding: 1rem 2rem;
            background: var(--color-accent);
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25);
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-primary:hover::before {
            left: 100%;
        }
        .btn-primary:hover {
            background: var(--color-accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
        }

        .btn-secondary {
            padding: 1rem 2rem;
            background: transparent;
            color: var(--color-text);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 8px;
            border: 2px solid var(--color-border);
            transition: var(--transition-smooth);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }
        .btn-secondary::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 0; height: 100%;
            background: var(--color-accent);
            transition: width 0.3s var(--ease-out-expo);
            z-index: -1;
        }
        .btn-secondary:hover::before {
            width: 100%;
        }
        .btn-secondary:hover {
            border-color: var(--color-accent);
            color: white;
        }

        /* Hero visual with floating animation */
        .hero-visual {
            position: relative;
            opacity: 0;
            transform: translateX(50px) rotateY(-10deg);
            animation: slideIn3D 1s var(--ease-out-expo) 0.4s forwards;
            perspective: 1000px;
        }

        @keyframes slideIn3D {
            to {
                opacity: 1;
                transform: translateX(0) rotateY(0);
            }
        }

        .hero-mockup {
            background: var(--color-surface);
            border-radius: 16px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.1), 0 10px 30px rgba(59, 130, 246, 0.1);
            overflow: hidden;
            border: 1px solid var(--color-border);
            animation: float 6s ease-in-out infinite;
            transform-style: preserve-3d;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0); }
            50% { transform: translateY(-15px) rotateX(2deg); }
        }

        .mockup-header {
            padding: 1rem 1.5rem;
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .mockup-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        .mockup-dot:hover { transform: scale(1.3); }
        .mockup-dot.red { background: #ef4444; }
        .mockup-dot.yellow { background: #f59e0b; }
        .mockup-dot.green { background: #10b981; }

        .mockup-content {
            padding: 2rem;
            min-height: 300px;
        }

        .mockup-website {
            text-align: center;
            padding: 3rem 2rem;
        }
        .mockup-logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 1rem;
        }
        .mockup-headline {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-text);
            margin-bottom: 0.75rem;
        }
        .mockup-subtext {
            color: var(--color-text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .mockup-button {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background: var(--color-accent);
            color: white;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .mockup-button:hover { transform: scale(1.05); }

        /* Stats with counter animation */
        .stats-bar {
            padding: 4rem 5%;
            background: var(--color-surface);
            border-top: 1px solid var(--color-border);
            border-bottom: 1px solid var(--color-border);
            position: relative;
        }

        .stats-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            text-align: center;
        }

        .stat-item {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s var(--ease-out-expo);
        }
        .stat-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .stat-item:nth-child(1) { transition-delay: 0.1s; }
        .stat-item:nth-child(2) { transition-delay: 0.2s; }
        .stat-item:nth-child(3) { transition-delay: 0.3s; }
        .stat-item:nth-child(4) { transition-delay: 0.4s; }

        .stat-item h3 {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-accent), #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .stat-item p {
            font-size: 0.9rem;
            color: var(--color-text-muted);
            font-weight: 500;
        }

        /* Services with hover cards */
        .services { 
            padding: 8rem 5%; 
            background: var(--color-bg); 
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .section-header {
            text-align: center;
            max-width: 650px;
            margin: 0 auto 4rem;
        }
        .section-label {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s var(--ease-out-expo);
        }
        .section-label.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .section-title {
            font-family: var(--font-display);
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 800;
            margin-bottom: 1rem;
            color: var(--color-text);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s var(--ease-out-expo) 0.1s;
        }
        .section-title.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .section-subtitle {
            color: var(--color-text-muted);
            font-size: 1.1rem;
            line-height: 1.7;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s var(--ease-out-expo) 0.2s;
        }
        .section-subtitle.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }
        .service-card {
            background: var(--color-surface);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid var(--color-border);
            transition: all 0.4s var(--ease-out-expo);
            opacity: 0;
            transform: translateY(40px);
        }
        .service-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .service-card:nth-child(1) { transition-delay: 0.1s; }
        .service-card:nth-child(2) { transition-delay: 0.2s; }
        .service-card:nth-child(3) { transition-delay: 0.3s; }
        .service-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            border-color: var(--color-accent);
        }
        .service-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1.5rem;
            transition: all 0.4s var(--ease-out-expo);
        }
        .service-card:hover .service-icon {
            background: linear-gradient(135deg, var(--color-accent), #8b5cf6);
            transform: scale(1.1) rotate(5deg);
        }
        .service-card h3 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--color-text);
        }
        .service-card p {
            color: var(--color-text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* Process with connected steps */
        .process { 
            padding: 8rem 5%; 
            background: var(--color-surface); 
            position: relative;
        }
        .process-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
        }
        .process-grid::before {
            content: '';
            position: absolute;
            top: 30px;
            left: 12.5%;
            right: 12.5%;
            height: 2px;
            background: linear-gradient(90deg, var(--color-accent), #8b5cf6);
            opacity: 0.2;
        }
        .process-step {
            text-align: center;
            position: relative;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s var(--ease-out-expo);
        }
        .process-step.visible {
            opacity: 1;
            transform: scale(1);
        }
        .process-step:nth-child(1) { transition-delay: 0.1s; }
        .process-step:nth-child(2) { transition-delay: 0.2s; }
        .process-step:nth-child(3) { transition-delay: 0.3s; }
        .process-step:nth-child(4) { transition-delay: 0.4s; }

        .step-number {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--color-accent), #8b5cf6);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 800;
            margin: 0 auto 1.5rem;
            position: relative;
            z-index: 1;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: transform 0.3s ease;
        }
        .process-step:hover .step-number {
            transform: scale(1.1);
        }
        .process-step h3 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .process-step p {
            color: var(--color-text-muted);
            font-size: 0.9rem;
        }

        /* Portfolio with hover reveal */
        .portfolio { 
            padding: 8rem 5%; 
            background: var(--color-bg); 
        }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        .portfolio-item {
            background: var(--color-surface);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--color-border);
            transition: all 0.4s var(--ease-out-expo);
            opacity: 0;
            transform: translateY(40px);
        }
        .portfolio-item.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .portfolio-item:nth-child(1) { transition-delay: 0.1s; }
        .portfolio-item:nth-child(2) { transition-delay: 0.2s; }
        .portfolio-item:nth-child(3) { transition-delay: 0.3s; }
        .portfolio-item:nth-child(4) { transition-delay: 0.4s; }
        .portfolio-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.12);
        }
        .portfolio-image {
            height: 240px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
            transition: transform 0.6s var(--ease-out-expo);
        }
        .portfolio-item:hover .portfolio-image {
            transform: scale(1.05);
        }
        .portfolio-image::after {
            content: 'View Project →';
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.95);
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-accent);
            transition: bottom 0.4s var(--ease-out-expo);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .portfolio-item:hover .portfolio-image::after {
            bottom: 20px;
        }
        .portfolio-info {
            padding: 1.5rem;
        }
        .portfolio-tag {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-accent);
            margin-bottom: 0.5rem;
        }
        .portfolio-info h3 {
            font-family: var(--font-display);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--color-text);
        }

        /* Pricing with featured highlight */
        .pricing { 
            padding: 8rem 5%; 
            background: var(--color-surface); 
        }
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }
        .pricing-card {
            background: var(--color-bg);
            padding: 2.5rem;
            border-radius: 16px;
            border: 2px solid var(--color-border);
            text-align: center;
            transition: all 0.4s var(--ease-out-expo);
            opacity: 0;
            transform: translateY(40px);
            position: relative;
        }
        .pricing-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .pricing-card:nth-child(1) { transition-delay: 0.1s; }
        .pricing-card:nth-child(2) { transition-delay: 0.2s; }
        .pricing-card:nth-child(3) { transition-delay: 0.3s; }
